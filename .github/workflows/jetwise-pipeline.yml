# Runs Jetwise suggestion pipeline against production (or staging) Postgres.
# Vercel cannot run Polars/long jobs — this workflow runs on Ubuntu runners instead.
#
# Required repo secret:
#   POSTGRES_URL — same pooled Postgres URL as Vercel (Neon / Vercel Postgres).
#
# Data inputs — pick ONE approach per mode:
#
# (A) GitHub Releases (recommended)
#   Set repository variable PIPELINE_DATA_RELEASE_TAG to a tag that exists on THIS repo
#   (e.g. pipeline-data-2026-05-01). Attach assets with EXACT filenames:
#     full             → jetwise-parquet.tar.gz  (extracts to ~/Downloads/*.parquet as below)
#     directional-only → final_routes_directional.parquet
#     csv-only         → hub_suggestions_seed.csv
#   Workflow uses `gh release download` + GITHUB_TOKEN (works for private repos).
#
#   Creating a release (click-path summary):
#     Releases → Draft release → choose tag / create tag → attach files → Publish.
#
# (B) Raw HTTPS URL secrets (any host, including public Release CDN URLs)
#   full             → JETWISE_PIPELINE_DATA_TAR_URL — .tar.gz → ~/Downloads/airports.parquet,
#                       long_airports.parquet, routes.parquet
#   directional-only → JETWISE_DIRECTIONAL_PARQUET_URL
#   csv-only         → JETWISE_HUB_SEED_CSV_URL
#
#   Public Release asset URL shape (optional instead of(A)):
#     https://github.com/OWNER/REPO/releases/download/<TAG>/<filename>
#
# Optional repository variables:
#   IMPORT_SUGGESTIONS_LIMIT — passed through .env.local (script default 150)
#   PIPELINE_SCHEDULE_MODE — scheduled runs only: directional-only | csv-only | full (default directional-only)

name: Jetwise pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Pipeline mode
        type: choice
        required: true
        default: directional-only
        options:
          - full
          - directional-only
          - csv-only
  schedule:
    - cron: "0 7 * * 1"

concurrency:
  group: jetwise-pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve mode
        id: mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          SCHEDULE_MODE: ${{ vars.PIPELINE_SCHEDULE_MODE }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "value=${INPUT_MODE}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${SCHEDULE_MODE:-directional-only}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate secrets
        shell: bash
        env:
          MODE: ${{ steps.mode.outputs.value }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          RELEASE_TAG: ${{ vars.PIPELINE_DATA_RELEASE_TAG }}
          TAR_URL: ${{ secrets.JETWISE_PIPELINE_DATA_TAR_URL }}
          DIR_URL: ${{ secrets.JETWISE_DIRECTIONAL_PARQUET_URL }}
          CSV_URL: ${{ secrets.JETWISE_HUB_SEED_CSV_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${POSTGRES_URL:-}" ]]; then
            echo "::error::Set repository secret POSTGRES_URL"
            exit 1
          fi
          has_rel=0
          [[ -n "${RELEASE_TAG:-}" ]] && has_rel=1

          case "$MODE" in
            full)
              if [[ "$has_rel" -eq 0 ]] && [[ -z "${TAR_URL:-}" ]]; then
                echo "::error::full mode: set repository variable PIPELINE_DATA_RELEASE_TAG (GitHub Release with jetwise-parquet.tar.gz) or secret JETWISE_PIPELINE_DATA_TAR_URL"
                exit 1
              fi
              ;;
            directional-only)
              if [[ "$has_rel" -eq 0 ]] && [[ -z "${DIR_URL:-}" ]]; then
                echo "::error::directional-only: set PIPELINE_DATA_RELEASE_TAG or JETWISE_DIRECTIONAL_PARQUET_URL"
                exit 1
              fi
              ;;
            csv-only)
              if [[ "$has_rel" -eq 0 ]] && [[ -z "${CSV_URL:-}" ]]; then
                echo "::error::csv-only: set PIPELINE_DATA_RELEASE_TAG or JETWISE_HUB_SEED_CSV_URL"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unknown mode: $MODE"; exit 1
              ;;
          esac

      - uses: actions/setup-python@v5
        if: steps.mode.outputs.value != 'csv-only'
        with:
          python-version: "3.12"

      - name: Python venv + Polars
        if: steps.mode.outputs.value != 'csv-only'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -U pip polars

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install web-app dependencies
        working-directory: web-app
        run: npm ci

      - name: Write web-app/.env.local
        working-directory: web-app
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          IMPORT_SUGGESTIONS_LIMIT: ${{ vars.IMPORT_SUGGESTIONS_LIMIT }}
        run: |
          set -euo pipefail
          {
            echo "POSTGRES_URL=${POSTGRES_URL}"
            if [[ -n "${IMPORT_SUGGESTIONS_LIMIT:-}" ]]; then
              echo "IMPORT_SUGGESTIONS_LIMIT=${IMPORT_SUGGESTIONS_LIMIT}"
            fi
          } > .env.local

      - name: Full pipeline (build_routes → export_hub_seed → import)
        if: steps.mode.outputs.value == 'full'
        env:
          RELEASE_TAG: ${{ vars.PIPELINE_DATA_RELEASE_TAG }}
          TAR_URL: ${{ secrets.JETWISE_PIPELINE_DATA_TAR_URL }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Downloads"
          if [[ -n "${RELEASE_TAG:-}" ]]; then
            gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
              -p "jetwise-parquet.tar.gz" -O /tmp/jetwise-parquet.tar.gz
          else
            curl -fsSL "${TAR_URL}" -o /tmp/jetwise-parquet.tar.gz
          fi
          tar -xzf /tmp/jetwise-parquet.tar.gz -C "$HOME/Downloads"
          chmod +x run_pipeline.sh || true
          bash run_pipeline.sh

      - name: Directional parquet → CSV → import
        if: steps.mode.outputs.value == 'directional-only'
        env:
          RELEASE_TAG: ${{ vars.PIPELINE_DATA_RELEASE_TAG }}
          DIR_URL: ${{ secrets.JETWISE_DIRECTIONAL_PARQUET_URL }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Downloads"
          if [[ -n "${RELEASE_TAG:-}" ]]; then
            gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
              -p "final_routes_directional.parquet" \
              -O "$HOME/Downloads/final_routes_directional.parquet"
          else
            curl -fsSL "${DIR_URL}" -o "$HOME/Downloads/final_routes_directional.parquet"
          fi
          .venv/bin/python export_hub_seed.py
          cd web-app
          npm run import-suggestions

      - name: Hub CSV → import only
        if: steps.mode.outputs.value == 'csv-only'
        env:
          RELEASE_TAG: ${{ vars.PIPELINE_DATA_RELEASE_TAG }}
          CSV_URL: ${{ secrets.JETWISE_HUB_SEED_CSV_URL }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Downloads"
          if [[ -n "${RELEASE_TAG:-}" ]]; then
            gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
              -p "hub_suggestions_seed.csv" \
              -O "$HOME/Downloads/hub_suggestions_seed.csv"
          else
            curl -fsSL "${CSV_URL}" -o "$HOME/Downloads/hub_suggestions_seed.csv"
          fi
          cd web-app
          npm run import-suggestions
